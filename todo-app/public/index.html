
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>Todo App</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:opsz,wght@17..18,500&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="./styles.css">
	</head>
	<body>
		<container>
			<h1>Todo App</h1>
			<img id="todo-image" src="/image.jpg" alt="Todo App image" width="1200" height="1200">
            <form id="todo-form">
                <input type="text" name="text" placeholder="Enter a new todo (max 140 characters)" maxlength="140" id="todo-input" required>
                <button id="add-todo">Send</button>
            </form>
            <h2>Todos</h2>
            <ul id="todo-list">
            </ul>
		</container>
        <script type="module" src="/js/app.js"></script>
	</body>
</html>
