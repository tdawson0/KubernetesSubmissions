
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,initial-scale=1">
		<title>Todo App</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:opsz,wght@17..18,500&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="./styles.css">
        <script src="./refresh-image.js" defer></script>
	</head>
	<body>
		<container>
			<h1>Todo App</h1>
			<img id="todo-image" src="/image.jpg" alt="Todo App image">
            <div>
                <input type="text" placeholder="Enter a new todo (max 140 characters)" maxlength="140" id="todo-input">
                <button id="add-todo">Send</button>
            </div>
            <h2>Todos</h2>
            <ul id="todo-list">
                <li>Learn Kubernetes basics</li>
                <li>Deploy application to cluster</li>
                <li>Configure persistent volumes</li>
            </ul>
		</container>
	</body>
</html>
